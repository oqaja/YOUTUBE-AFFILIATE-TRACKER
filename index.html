<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Content Production Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 border-b border-slate-200 mb-8 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Content Production Dashboard</h1>
        <p class="text-sm text-slate-500">Monitoring real-time workflow produksi konten</p>
      </div>
      <div id="loading" class="flex items-center gap-2 text-sm text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full font-medium">
        <span class="animate-pulse">⏳ Memuat data dari Google Sheets...</span>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-200 flex flex-col justify-center">
        <label class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Filter Tanggal</label>
        <select id="filterTanggal" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-cyan-500 text-slate-700 font-medium">
          <option value="">Semua Tanggal</option>
        </select>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-200 flex flex-col justify-center">
        <label class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Filter Jenis Konten</label>
        <select id="filterJenis" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-cyan-500 text-slate-700 font-medium">
          <option value="">Semua Jenis</option>
        </select>
      </div>

      <div class="hidden md:block"></div>

      <div class="bg-gradient-to-br from-cyan-500 to-blue-600 text-white p-4 rounded-xl shadow-md flex flex-col justify-between">
        <span class="text-xs font-medium uppercase tracking-wider opacity-80">Jumlah Konten</span>
        <span id="jumlahKonten" class="text-4xl font-bold mt-2">0</span>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-900 text-white text-xs font-semibold uppercase tracking-wider">
              <th class="p-4">Upload Date</th>
              <th class="p-4 min-w-[200px]">Judul Konten</th>
              <th class="p-4">Akun</th>
              <th class="p-4">Jam</th>
              <th class="p-4">Jenis Konten</th>
              <th class="p-4">Producer</th>
              <th class="p-4 text-center">Writing</th>
              <th class="p-4 text-center">Shooting</th>
              <th class="p-4">PIC Produksi</th>
              <th class="p-4 text-center">Production</th>
              <th class="p-4 text-center">Upload</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let masterData = [];

    // Jalankan fungsi saat web dibuka
    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(data) {
          if(data.error) {
            alert(data.error);
            return;
          }
          masterData = data;
          document.getElementById('loading').classList.add('hidden');
          setupFilters();
          applyFilters();
        })
        .getDashboardData();
    };

    // Setup opsi dropdown filter secara dinamis dari data yang unik
    function setupFilters() {
      const tanggalSelect = document.getElementById('filterTanggal');
      const jenisSelect = document.getElementById('filterJenis');
      
      const unikTanggal = [...new Set(masterData.map(item => item.tanggal))].filter(Boolean);
      const unikJenis = [...new Set(masterData.map(item => item.jenisKonten))].filter(Boolean);

      unikTanggal.forEach(tgl => {
        let opt = document.createElement('option');
        opt.value = tgl;
        opt.innerHTML = tgl;
        tanggalSelect.appendChild(opt);
      });

      unikJenis.forEach(jns => {
        let opt = document.createElement('option');
        opt.value = jns;
        opt.innerHTML = jns;
        jenisSelect.appendChild(opt);
      });
    }

    // Fungsi filter & render table + update KPI secara real-time
    function applyFilters() {
      const tglFilter = document.getElementById('filterTanggal').value;
      const jnsFilter = document.getElementById('filterJenis').value;

      const filteredData = masterData.filter(item => {
        const matchTgl = tglFilter === "" || item.tanggal === tglFilter;
        const matchJns = jnsFilter === "" || item.jenisKonten === jnsFilter;
        return matchTgl && matchJns;
      });

      // Update Card Jumlah Konten sesuai filter
      document.getElementById('jumlahKonten').innerText = filteredData.length;

      // Render Baris Tabel
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = "";

      if(filteredData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="11" class="p-8 text-center text-slate-400">Tidak ada data yang cocok dengan filter.</td></tr>`;
        return;
      }

      filteredData.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        
        tr.innerHTML = `
          <td class="p-4 whitespace-nowrap text-slate-500 font-medium">${item.tanggal}</td>
          <td class="p-4 font-semibold text-slate-900">${item.judul || '-'}</td>
          <td class="p-4"><span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs font-bold">${item.akun || '-'}</span></td>
          <td class="p-4 text-slate-500 font-mono">${item.jam || '-'}</td>
          <td class="p-4"><span class="bg-cyan-50 text-cyan-700 border border-cyan-100 px-2.5 py-0.5 rounded-full text-xs font-medium">${item.jenisKonten || '-'}</span></td>
          <td class="p-4 text-slate-600">${item.producer || '-'}</td>
          <td class="p-4 text-center">${getBadgeStatus(item.writing)}</td>
          <td class="p-4 text-center">${getBadgeStatus(item.shooting)}</td>
          <td class="p-4 text-slate-600 font-medium">${item.picProduksi || '-'}</td>
          <td class="p-4 text-center">${getBadgeStatus(item.production)}</td>
          <td class="p-4 text-center">${getBadgeStatus(item.upload)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Mengubah nilai boolean true/false menjadi badge check hijau atau tanda strip abu-abu
    function getBadgeStatus(status) {
      if(status) {
        return `<span class="inline-flex items-center bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded-md text-xs font-bold">✔ Done</span>`;
      } else {
        return `<span class="text-slate-300 text-lg font-bold">-</span>`;
      }
    }
  </script>
</body>
</html>
