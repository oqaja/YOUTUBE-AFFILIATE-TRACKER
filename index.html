<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sort By — Product Commission Tracker</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #8b93a3;
    --accent: #5fd0a8;
    --accent-dim: #2f6b57;
    --danger: #e8735f;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 20px;
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
  }
  .search-box::placeholder { color: var(--text-dim); }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent-dim); }
  .btn.reset { color: var(--danger); }
  .status {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 12px;
  }
  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 780px;
  }
  thead th {
    background: var(--panel-2);
    padding: 10px 12px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th .arrow { margin-left: 4px; opacity: 0.6; font-size: 10px; }
  .filter-row td {
    padding: 8px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .filter-cell {
    display: flex;
    gap: 4px;
  }
  .filter-cell select, .filter-cell input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 6px;
    font-size: 12px;
    width: 100%;
  }
  .filter-cell select { flex: 0 0 46px; }
  tbody td {
    padding: 10px 12px;
    font-size: 13.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--panel-2); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.num { text-align: right; }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .loading { color: var(--text-dim); font-size: 13px; padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Sort By — Product Commission Tracker</h1>
  <p class="subtitle">Sort dan filter data produk dari Google Sheets</p>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Cari nama produk...">
    <button class="btn" id="refreshBtn">Refresh Data</button>
    <button class="btn reset" id="resetBtn">Reset Filter</button>
  </div>

  <div class="status" id="statusText">Memuat data...</div>

  <div class="table-scroll">
    <table id="dataTable">
      <thead>
        <tr id="headerRow"></tr>
        <tr class="filter-row" id="filterRow"></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="loading">Memuat data dari Google Sheets...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ==== CONFIG ====
const API_URL = "https://script.google.com/macros/s/AKfycbwkl_N5G4H7nSGkf9WOPCzDDr8s9q5sIrqq93xYwDlDOvVZzrc3gKn58oUaMJF5dWYU/exec";

const COLUMNS = [
  { key: "product_title", label: "Product Title", type: "text" },
  { key: "total_sales", label: "Total Sales", type: "number" },
  { key: "orders", label: "Orders", type: "number" },
  { key: "approve_commissions", label: "Approve Comm.", type: "number" },
  { key: "pending_commissions", label: "Pending Comm.", type: "number" },
  { key: "estimated_revenue", label: "Est. Revenue", type: "number" }
];

let rawData = [];
let sortState = { key: null, dir: 1 }; // dir: 1 asc, -1 desc
let filters = {}; // { key: { op: '>'|'<', value: number } } for numbers, or string for text search per column

function init() {
  buildHeader();
  buildFilterRow();
  document.getElementById("refreshBtn").addEventListener("click", loadData);
  document.getElementById("resetBtn").addEventListener("click", resetAll);
  document.getElementById("searchBox").addEventListener("input", (e) => {
    filters.__search = e.target.value.trim().toLowerCase();
    render();
  });
  loadData();
}

function buildHeader() {
  const headerRow = document.getElementById("headerRow");
  headerRow.innerHTML = "";
  COLUMNS.forEach(col => {
    const th = document.createElement("th");
    th.className = col.type === "number" ? "num" : "";
    th.innerHTML = `${col.label}<span class="arrow" data-key="${col.key}"></span>`;
    th.addEventListener("click", () => toggleSort(col.key));
    headerRow.appendChild(th);
  });
}

function buildFilterRow() {
  const filterRow = document.getElementById("filterRow");
  filterRow.innerHTML = "";
  COLUMNS.forEach(col => {
    const td = document.createElement("td");
    if (col.type === "number") {
      td.innerHTML = `
        <div class="filter-cell">
          <select data-key="${col.key}" class="op-select">
            <option value=">">&gt;</option>
            <option value="<">&lt;</option>
          </select>
          <input type="number" data-key="${col.key}" class="val-input" placeholder="nilai">
        </div>`;
    } else {
      td.innerHTML = `<input type="text" data-key="${col.key}" class="text-filter" placeholder="filter ${col.label.toLowerCase()}...">`;
    }
    filterRow.appendChild(td);
  });

  filterRow.querySelectorAll(".op-select, .val-input").forEach(el => {
    el.addEventListener("input", applyNumericFilters);
    el.addEventListener("change", applyNumericFilters);
  });
  filterRow.querySelectorAll(".text-filter").forEach(el => {
    el.addEventListener("input", (e) => {
      filters[e.target.dataset.key] = e.target.value.trim().toLowerCase();
      render();
    });
  });
}

function applyNumericFilters() {
  const filterRow = document.getElementById("filterRow");
  COLUMNS.filter(c => c.type === "number").forEach(col => {
    const op = filterRow.querySelector(`.op-select[data-key="${col.key}"]`).value;
    const valStr = filterRow.querySelector(`.val-input[data-key="${col.key}"]`).value;
    if (valStr === "") {
      delete filters[col.key];
    } else {
      filters[col.key] = { op, value: parseFloat(valStr) };
    }
  });
  render();
}

function toggleSort(key) {
  if (sortState.key === key) {
    sortState.dir *= -1;
  } else {
    sortState.key = key;
    sortState.dir = 1;
  }
  updateSortArrows();
  render();
}

function updateSortArrows() {
  document.querySelectorAll(".arrow").forEach(a => {
    if (a.dataset.key === sortState.key) {
      a.textContent = sortState.dir === 1 ? "▲" : "▼";
    } else {
      a.textContent = "";
    }
  });
}

function resetAll() {
  filters = {};
  sortState = { key: null, dir: 1 };
  document.getElementById("searchBox").value = "";
  document.querySelectorAll(".val-input, .text-filter").forEach(el => el.value = "");
  document.querySelectorAll(".op-select").forEach(el => el.value = ">");
  updateSortArrows();
  render();
}

async function loadData() {
  const statusText = document.getElementById("statusText");
  statusText.textContent = "Memuat data dari Google Sheets...";
  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "Gagal memuat data");
    rawData = json.data;
    statusText.textContent = `${rawData.length} produk dimuat • terakhir refresh: ${new Date().toLocaleTimeString("id-ID")}`;
    render();
  } catch (err) {
    statusText.textContent = "Gagal memuat data: " + err.message;
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="6" class="empty-state">Gagal memuat data. Cek koneksi atau URL Apps Script.</td></tr>`;
  }
}

function render() {
  let rows = [...rawData];

  // global search on product title
  if (filters.__search) {
    rows = rows.filter(r => r.product_title.toLowerCase().includes(filters.__search));
  }

  // per-column filters
  COLUMNS.forEach(col => {
    const f = filters[col.key];
    if (f === undefined || f === "") return;
    if (col.type === "text") {
      rows = rows.filter(r => String(r[col.key]).toLowerCase().includes(f));
    } else {
      if (isNaN(f.value)) return;
      rows = rows.filter(r => f.op === ">" ? r[col.key] > f.value : r[col.key] < f.value);
    }
  });

  // sort
  if (sortState.key) {
    const col = COLUMNS.find(c => c.key === sortState.key);
    rows.sort((a, b) => {
      let va = a[sortState.key], vb = b[sortState.key];
      if (col.type === "text") {
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
        return va.localeCompare(vb) * sortState.dir;
      }
      return (va - vb) * sortState.dir;
    });
  }

  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById("tableBody");
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Tidak ada data yang cocok dengan filter.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${escapeHtml(r.product_title)}</td>
      <td class="num">${formatNum(r.total_sales)}</td>
      <td class="num">${formatNum(r.orders)}</td>
      <td class="num">${formatNum(r.approve_commissions)}</td>
      <td class="num">${formatNum(r.pending_commissions)}</td>
      <td class="num">${formatNum(r.estimated_revenue)}</td>
    </tr>
  `).join("");
}

function formatNum(n) {
  return Number(n).toLocaleString("id-ID");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
