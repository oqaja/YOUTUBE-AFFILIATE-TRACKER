<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Kalender Konten</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        /* Frame Container biar mirip mockup aplikasi mobile */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            min-height: 90vh;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #eef2f6;
        }
        .header {
            margin-bottom: 20px;
        }
        .header .sub-title {
            font-size: 14px;
            color: #8e8e93;
            font-weight: 500;
        }
        .header .title {
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            margin-top: 4px;
        }
        /* 1. Horizontal Date Slider Section */
        .date-slider {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 25px;
            scrollbar-width: none; /* Hilangin scrollbar di Firefox */
        }
        .date-slider::-webkit-scrollbar {
            display: none; /* Hilangin scrollbar di Chrome/Safari */
        }
        .date-item {
            flex: 0 0 55px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border-radius: 16px;
            background-color: #f2f2f7;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .date-item .day-name {
            font-size: 12px;
            color: #8e8e93;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .date-item .day-num {
            font-size: 16px;
            font-weight: 700;
            color: #1c1c1e;
        }
        /* Style pas Tanggal di-klik / Aktif */
        .date-item.active {
            background-color: #2f80ed;
            box-shadow: 0 8px 16px rgba(47, 128, 237, 0.25);
        }
        .date-item.active .day-name {
            color: rgba(255, 255, 255, 0.8);
        }
        .date-item.active .day-num {
            color: #ffffff;
        }
        .date-item .indicator-dot {
            width: 4px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 50%;
            margin-top: 4px;
            opacity: 0;
        }
        .date-item.active .indicator-dot {
            opacity: 1;
        }
        #loading {
            text-align: center;
            color: #8e8e93;
            font-weight: 500;
            margin-top: 40px;
        }
        /* 2. Vertical Timeline Section */
        .timeline-container {
            position: relative;
            flex-grow: 1;
        }
        .timeline-line {
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e5e5ea;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            display: flex;
        }
        .timeline-badge {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 3px solid #2f80ed;
            position: absolute;
            left: 0;
            top: 22px;
            z-index: 2;
        }
        /* 3. Content Card Style */
        .content-card {
            flex-grow: 1;
            margin-left: 28px;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #eef2f6;
            transition: all 0.3s ease;
        }
        /* Card Pertama/Utama otomatis berwarna Biru sesuai mockup */
        .timeline-item:nth-child(1) .content-card {
            background: #2f80ed;
            color: #ffffff;
            border: none;
            box-shadow: 0 10px 20px rgba(47, 128, 237, 0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            max-width: 75%;
        }
        .card-time {
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            background: rgba(0,0,0,0.04);
            padding: 4px 8px;
            border-radius: 8px;
        }
        .timeline-item:nth-child(1) .card-time {
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.2);
        }
        /* Detail List di dalam Card */
        .card-details {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            font-size: 12px;
            border-top: 1px solid #e5e5ea;
            padding-top: 10px;
            color: #48484a;
        }
        .timeline-item:nth-child(1) .card-details {
            border-top: 1px solid rgba(255,255,255,0.2);
            color: rgba(255, 255, 255, 0.85);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
        }
        .detail-row span:last-child {
            font-weight: 600;
            text-align: right;
        }
        /* Bottom Tab Bar Navigation Mockup */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e5ea;
        }
        .nav-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            opacity: 0.4;
        }
        .nav-icon.active {
            opacity: 1;
            color: #2f80ed;
        }
        .btn-plus {
            width: 45px;
            height: 45px;
            background: #2f80ed;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(47, 128, 237, 0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="sub-title" id="liveDate">Loading Date...</div>
        <div class="title">Today</div>
    </div>

    <div class="date-slider" id="dateSlider"></div>

    <div id="loading">Memuat Kalender Konten...</div>

    <div class="timeline-container" id="timelineContainer" style="display:none;">
        <div class="timeline-line"></div>
        <div id="timelineList"></div>
    </div>

    <div class="bottom-nav">
        <svg class="nav-icon active" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .92-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.08-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        <div class="btn-plus">+</div>
        <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
    </div>
</div>

<script>
    // Taruh URL Web App Apps Script lu di bawah ini!
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwpkn1SQevB1HrWHrytZfBel7SNmfd6k6yGz0mQ-w1DaF9oUOUEbYnhpUmlEm020NW1aQ/exec';

    let masterData = [];
    let uniqueDates = [];
    let activeDate = '';

    // Set teks hari ini di header atas
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('liveDate').innerText = new Date().toLocaleDateString('en-US', options);

    async function loadTimelineData() {
        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('loading').innerText = data.error;
                return;
            }

            masterData = data.tableData;

            // 1. Ekstrak Semua Tanggal Unik dari Kolom UPLOAD pertama
            // Kita cari nama key yang mengandung kata 'UPLOAD' tapi bukan yang kembar kedua ('UPLOAD_2')
            const dateKey = data.headers.find(h => h.toUpperCase() === 'UPLOAD') || data.headers[0];
            uniqueDates = [...new Set(masterData.map(item => item[dateKey]).filter(Boolean))];

            if(uniqueDates.length === 0) {
                document.getElementById('loading').innerText = "Tidak ada data tanggal ditemukan di Sheets.";
                return;
            }

            // Set tanggal aktif pertama kali ke index 0 atau hari ini kalau ada
            activeDate = uniqueDates[0];

            // 2. Render Slider Tanggal
            renderDateSlider(dateKey);

            // 3. Render list timeline pertama kali
            renderTimeline(activeDate, dateKey);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('timelineContainer').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "Gagal mengambil data database.";
        }
    }

    function renderDateSlider(dateKey) {
        const slider = document.getElementById('dateSlider');
        slider.innerHTML = '';

        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        uniqueDates.forEach(dateStr => {
            let displayDay = "Id";
            let displayNum = dateStr.split(/[-/]/)[0]; // Ambil angka tanggal depannya aja

            // Coba parsing hari asli dari string tanggal Google Sheets (Format: 02-Jul-2026 atau 02/07/2026)
            let parsedDate = new Date(dateStr.replace(/-/g, ' '));
            if (!isNaN(parsedDate.getTime())) {
                displayDay = dayNames[parsedDate.getDay()];
                displayNum = parsedDate.getDate();
            }

            const item = document.createElement('div');
            item.className = `date-item ${dateStr === activeDate ? 'active' : ''}`;
            item.innerHTML = `
                <div class="day-name">${displayDay}</div>
                <div class="day-num">${displayNum}</div>
                <div class="indicator-dot"></div>
            `;

            item.onclick = () => {
                document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                activeDate = dateStr;
                renderTimeline(activeDate, dateKey);
            };

            slider.appendChild(item);
        });
    }

    function renderTimeline(targetDate, dateKey) {
        const listContainer = document.getElementById('timelineList');
        listContainer.innerHTML = '';

        // Saring data berdasarkan tanggal yang di-klik di slider
        const filtered = masterData.filter(row => row[dateKey] === targetDate);

        if (filtered.length === 0) {
            listContainer.innerHTML = '<div style="text-align:center; color:#8e8e93; margin-top:20px;">Gak ada konten buat tanggal ini, bro.</div>';
            return;
        }

        // Helper untuk mempermudah pencarian key Object yang ga sensitif huruf besar/kecil
        const getVal = (obj, keyName) => {
            const foundKey = Object.keys(obj).find(k => k.replace(/_\d+$/, '').toUpperCase() === keyName.toUpperCase());
            return foundKey ? obj[foundKey] : '-';
        };

        filtered.forEach(row => {
            const item = document.createElement('div');
            item.className = 'timeline-item';

            // Ambil semua field yang lu minta secara presisi
            let judul = getVal(row, 'JUDUL KONTEN');
            let jam = getVal(row, 'JAM');
            let akun = getVal(row, 'AKUN');
            let jenis = getVal(row, 'JENIS KONTEN');
            let producer = getVal(row, 'PRODUCER');
            let writing = getVal(row, 'WRITING'); // Isinya emot centang dari Apps script
            let shooting = getVal(row, 'SHOOTING');
            let pic = getVal(row, 'PIC PRODUKSI');
            let produksi = getVal(row, 'PRODUCTION'); // Isinya emot centang dari Apps script
            let statusUpload = getVal(row, 'UPLOAD_2'); // Kolom UPLOAD kedua (K)
            let brand = getVal(row, 'BRAND TAP IN'); 
            let catatan = getVal(row, 'CATATAN');

            item.innerHTML = `
                <div class="timeline-badge"></div>
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-title">${judul !== '-' ? judul : 'Tanpa Judul'}</div>
                        <div class="card-time">${jam !== '-' ? jam : '--.--'}</div>
                    </div>
                    <div class="card-details">
                        <div class="detail-row"><span>Akun</span><span>${akun}</span></div>
                        <div class="detail-row"><span>Jenis Konten</span><span>${jenis}</span></div>
                        <div class="detail-row"><span>Producer</span><span>${producer}</span></div>
                        <div class="detail-row"><span>Status Writing</span><span>${writing || '❌'}</span></div>
                        <div class="detail-row"><span>Status Shooting</span><span>${shooting || '❌'}</span></div>
                        <div class="detail-row"><span>PIC Produksi</span><span>${pic}</span></div>
                        <div class="detail-row"><span>Status Produksi</span><span>${produksi || '❌'}</span></div>
                        <div class="detail-row"><span>Status Upload</span><span>${statusUpload || '❌'}</span></div>
                        <div class="detail-row"><span>Brand Tap In</span><span>${brand}</span></div>
                        <div class="detail-row"><span>Catatan</span><span>${catatan}</span></div>
                    </div>
                </div>
            `;
            listContainer.appendChild(item);
        });
    }

    // Eksekusi kode pas web dibuka
    loadTimelineData();
</script>
</body>
</html>
